name: Sync upstream

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync all branches and tags from upstream
        env:
          UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY || 'openclaw/openclaw' }}
        run: |
          set -euo pipefail

          if git remote get-url upstream >/dev/null 2>&1; then
            git remote set-url upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          else
            git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git"
          fi

          git fetch upstream --prune \
            +refs/heads/*:refs/upstream/heads/* \
            +refs/tags/*:refs/upstream/tags/*

          git push origin --prune +refs/upstream/heads/*:refs/heads/*
          git push origin --prune +refs/upstream/tags/*:refs/tags/*
